<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nova — AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #05010f;
    --panel: #0d0820;
    --border: #1e1040;
    --accent: #ff6b00;
    --accent2: #7c00ff;
    --text: #f0e8ff;
    --muted: #6b5a8a;
    --user-bg: #1a0a35;
    --bot-bg: #0d0820;
    --glow: 0 0 20px rgba(255,107,0,0.3);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    flex-shrink: 0;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-icon {
    width: 36px;
    height: 36px;
  }
  .logo-text {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: 4px;
    background: linear-gradient(135deg, #ff6b00, #ff9500);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .logo-sub {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 3px;
    margin-top: -4px;
  }
  .header-controls {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .mode-btn {
    background: var(--border);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    padding: 6px 12px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
  }
  .mode-btn:hover, .mode-btn.active {
    background: var(--accent2);
    border-color: var(--accent2);
    color: white;
  }
  .tts-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    width: 34px;
    height: 34px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .tts-btn:hover, .tts-btn.on {
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: var(--glow);
  }

  /* MAIN */
  main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* SIDEBAR */
  aside {
    width: 220px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
  }
  .sidebar-title {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    padding: 16px 16px 8px;
    text-transform: uppercase;
  }
  .new-chat-btn {
    margin: 0 12px 10px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none;
    color: white;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: opacity 0.2s;
  }
  .new-chat-btn:hover { opacity: 0.85; }
  .conv-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 8px;
  }
  .conv-item {
    padding: 8px 10px;
    border-radius: 6px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-family: 'Space Mono', monospace;
  }
  .conv-item:hover { background: var(--border); color: var(--text); }
  .conv-item.active { background: var(--border); color: var(--accent); }

  /* CHAT */
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    display: flex;
    gap: 12px;
    max-width: 780px;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }
  .msg.bot .avatar { background: linear-gradient(135deg, var(--accent2), var(--accent)); }
  .msg.user .avatar { background: var(--border); }
  .bubble {
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.6;
    max-width: calc(100% - 44px);
  }
  .msg.bot .bubble {
    background: var(--bot-bg);
    border: 1px solid var(--border);
    border-top-left-radius: 2px;
  }
  .msg.user .bubble {
    background: var(--user-bg);
    border: 1px solid #2a1060;
    border-top-right-radius: 2px;
    color: #d0b8ff;
  }
  .msg.loading .bubble { color: var(--muted); font-style: italic; }

  /* Welcome */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 12px;
    opacity: 0.5;
  }
  .welcome-title {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: 8px;
    background: linear-gradient(135deg, #ff6b00, #7c00ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .welcome-sub {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--muted);
  }

  /* INPUT */
  .input-area {
    padding: 16px 24px 20px;
    border-top: 1px solid var(--border);
    background: var(--panel);
  }
  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
    transition: border-color 0.2s;
  }
  .input-row:focus-within { border-color: var(--accent2); }
  .file-btn {
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 18px;
    padding: 2px;
    transition: color 0.2s;
    flex-shrink: 0;
  }
  .file-btn:hover { color: var(--accent); }
  #user-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    resize: none;
    max-height: 120px;
    line-height: 1.5;
  }
  #user-input::placeholder { color: var(--muted); }
  #send-btn {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none;
    color: white;
    width: 34px;
    height: 34px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.2s, transform 0.1s;
  }
  #send-btn:hover { opacity: 0.85; transform: scale(1.05); }

  /* File preview */
  #file-preview {
    display: none;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    background: var(--border);
    border-radius: 8px;
    margin-bottom: 8px;
    font-size: 12px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
  }
  #file-preview.show { display: flex; }
  #file-preview button {
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    margin-left: auto;
    font-size: 14px;
  }

  /* Config overlay */
  #config-overlay {
    position: fixed;
    inset: 0;
    background: rgba(5,1,15,0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    backdrop-filter: blur(4px);
  }
  .config-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    width: 420px;
    max-width: 95vw;
  }
  .config-box h2 {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 4px;
    background: linear-gradient(135deg, #ff6b00, #7c00ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 6px;
  }
  .config-box p {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 24px;
    letter-spacing: 1px;
  }
  .config-field { margin-bottom: 16px; }
  .config-field label {
    display: block;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  .config-field input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  .config-field input:focus { border-color: var(--accent2); }
  .config-submit {
    width: 100%;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none;
    color: white;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    padding: 12px;
    border-radius: 10px;
    cursor: pointer;
    letter-spacing: 2px;
    margin-top: 8px;
    transition: opacity 0.2s;
  }
  .config-submit:hover { opacity: 0.85; }
</style>
</head>
<body>

<!-- Config overlay -->
<div id="config-overlay">
  <div class="config-box">
    <h2>NOVA</h2>
    <p>CONFIGURE TON IA AVANT DE COMMENCER</p>
    <div class="config-field">
      <label>Clé API Google Gemini</label>
      <input type="password" id="cfg-key" placeholder="AIza... ou AQ.Ab8..."/>
    </div>
    <div class="config-field">
      <label>Nom de ton IA</label>
      <input type="text" id="cfg-name" value="Nova"/>
    </div>
    <button class="config-submit" onclick="startChat()">LANCER NOVA →</button>
  </div>
</div>

<!-- Header -->
<header>
  <div class="logo">
    <svg class="logo-icon" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="18" cy="18" r="17" stroke="#ff6b00" stroke-width="0.8" opacity="0.4"/>
      <polygon points="18,4 28,10 28,22 18,28 8,22 8,10" fill="none" stroke="url(#lg)" stroke-width="1.2"/>
      <circle cx="18" cy="16" r="7" fill="url(#lg2)" opacity="0.9"/>
      <circle cx="18" cy="16" r="3" fill="white"/>
      <defs>
        <linearGradient id="lg" x1="0" y1="0" x2="36" y2="36">
          <stop offset="0%" stop-color="#ff6b00"/>
          <stop offset="100%" stop-color="#7c00ff"/>
        </linearGradient>
        <radialGradient id="lg2" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#ff9500"/>
          <stop offset="100%" stop-color="#ff6b00"/>
        </radialGradient>
      </defs>
    </svg>
    <div>
      <div class="logo-text" id="header-name">NOVA</div>
      <div class="logo-sub">AI ASSISTANT</div>
    </div>
  </div>
  <div class="header-controls">
    <button class="mode-btn active" onclick="setMode('assistant', this)">Assistant</button>
    <button class="mode-btn" onclick="setMode('coach', this)">Coach</button>
    <button class="mode-btn" onclick="setMode('ami', this)">Ami</button>
    <button class="mode-btn" onclick="setMode('prof', this)">Prof</button>
    <button class="tts-btn" id="tts-btn" onclick="toggleTTS()" title="Voix on/off">🔊</button>
  </div>
</header>

<main>
  <!-- Sidebar -->
  <aside>
    <div class="sidebar-title">Conversations</div>
    <button class="new-chat-btn" onclick="newChat()">+ Nouveau chat</button>
    <div class="conv-list" id="conv-list"></div>
  </aside>

  <!-- Chat -->
  <div class="chat-area">
    <div class="messages" id="messages">
      <div class="welcome">
        <div class="welcome-title" id="welcome-name">NOVA</div>
        <div class="welcome-sub">TON IA PERSONNELLE — PRÊTE À T'AIDER</div>
      </div>
    </div>
    <div class="input-area">
      <div id="file-preview">
        <span>📎</span>
        <span id="file-name"></span>
        <button onclick="clearFile()">✕</button>
      </div>
      <div class="input-row">
        <button class="file-btn" onclick="document.getElementById('file-input').click()" title="Envoyer un fichier">📎</button>
        <input type="file" id="file-input" style="display:none" onchange="handleFile(this)" accept="image/*,.pdf,.txt"/>
        <textarea id="user-input" placeholder="Écris ton message..." rows="1" oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
        <button id="send-btn" onclick="sendMessage()">➤</button>
      </div>
    </div>
  </div>
</main>

<script>
  let apiKey = '';
  let botName = 'Nova';
  let ttsOn = false;
  let currentMode = 'assistant';
  let history = [];
  let conversations = JSON.parse(localStorage.getItem('nova_convs') || '[]');
  let currentConvId = null;
  let pendingFile = null;
  let pendingFileData = null;

  const modes = {
    assistant: "Tu es une assistante IA sympa, efficace et bienveillante. Tu réponds en français, de façon concise et claire.",
    coach: "Tu es un coach motivant et enthousiaste. Tu encourages, tu donnes de l'énergie, tu aides à surmonter les obstacles. Tu réponds en français.",
    ami: "Tu es un ami proche, décontracté et drôle. Tu parles comme un pote, avec humour et naturel. Tu réponds en français.",
    prof: "Tu es un professeur patient et pédagogue. Tu expliques clairement, avec des exemples, et tu vérifies la compréhension. Tu réponds en français."
  };

  function startChat() {
    const key = document.getElementById('cfg-key').value.trim();
    const name = document.getElementById('cfg-name').value.trim() || 'Nova';
    if (!key) { alert('Entre ta clé API !'); return; }
    apiKey = key;
    botName = name;
    document.getElementById('header-name').textContent = name.toUpperCase();
    document.getElementById('welcome-name').textContent = name.toUpperCase();
    document.getElementById('config-overlay').style.display = 'none';
    renderConvList();
  }

  function setMode(mode, btn) {
    currentMode = mode;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  function toggleTTS() {
    ttsOn = !ttsOn;
    document.getElementById('tts-btn').classList.toggle('on', ttsOn);
  }

  function speak(text) {
    if (!ttsOn) return;
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'fr-FR';
    u.rate = 1.05;
    speechSynthesis.speak(u);
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function handleFile(input) {
    const file = input.files[0];
    if (!file) return;
    pendingFile = file;
    document.getElementById('file-name').textContent = file.name;
    document.getElementById('file-preview').classList.add('show');
    const reader = new FileReader();
    reader.onload = e => { pendingFileData = e.target.result.split(',')[1]; };
    reader.readAsDataURL(file);
  }

  function clearFile() {
    pendingFile = null;
    pendingFileData = null;
    document.getElementById('file-preview').classList.remove('show');
    document.getElementById('file-input').value = '';
  }

  function addMsg(role, text) {
    const msgs = document.getElementById('messages');
    // Remove welcome screen
    const welcome = msgs.querySelector('.welcome');
    if (welcome) welcome.remove();
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? '👤' : '✦';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    div.appendChild(avatar);
    div.appendChild(bubble);
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return div;
  }

  async function sendMessage() {
    const input = document.getElementById('user-input');
    const text = input.value.trim();
    if (!text && !pendingFile) return;
    if (!apiKey) { alert('Configure ta clé API !'); return; }

    const userText = text || ('📎 ' + pendingFile.name);
    input.value = '';
    input.style.height = 'auto';
    addMsg('user', userText);

    // Build message content
    let content = [];
    if (pendingFileData && pendingFile) {
      const isImage = pendingFile.type.startsWith('image/');
      if (isImage) {
        content.push({ inline_data: { mime_type: pendingFile.type, data: pendingFileData } });
      }
    }
    if (text) content.push({ text });
    if (content.length === 0) content = [{ text: userText }];

    history.push({ role: 'user', parts: content });
    clearFile();

    const loading = addMsg('loading', botName + ' réfléchit...');

    try {
      const systemPrompt = modes[currentMode];
      // Convert history to OpenAI format for Groq
      const messages = [{ role: 'system', content: systemPrompt }];
      history.forEach(h => {
        const txt = h.parts.map(p => p.text || '').join('');
        messages.push({ role: h.role === 'model' ? 'assistant' : 'user', content: txt });
      });
      const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
        body: JSON.stringify({ model: 'llama-3.3-70b-versatile', messages, max_tokens: 1000 })
      });
      const data = await res.json();
      loading.remove();
      if (data.error) { addMsg('error', '❌ ' + data.error.message); history.pop(); return; }
      const reply = data.choices[0].message.content;
      history.push({ role: 'model', parts: [{ text: reply }] });
      addMsg('bot', reply);
      speak(reply);
      saveConversation(text || userText, reply);
    } catch (err) {
      loading.remove();
      addMsg('error', '❌ Erreur de connexion. Vérifie ta clé API.');
      history.pop();
    }
  }

  function saveConversation(userMsg, botReply) {
    if (!currentConvId) {
      currentConvId = Date.now().toString();
      conversations.unshift({ id: currentConvId, title: userMsg.slice(0, 30) + '...', messages: [] });
    }
    const conv = conversations.find(c => c.id === currentConvId);
    if (conv) {
      conv.messages.push({ user: userMsg, bot: botReply });
      localStorage.setItem('nova_convs', JSON.stringify(conversations));
      renderConvList();
    }
  }

  function renderConvList() {
    const list = document.getElementById('conv-list');
    list.innerHTML = '';
    conversations.forEach(conv => {
      const div = document.createElement('div');
      div.className = 'conv-item' + (conv.id === currentConvId ? ' active' : '');
      div.textContent = conv.title;
      div.onclick = () => loadConv(conv.id);
      list.appendChild(div);
    });
  }

  function loadConv(id) {
    const conv = conversations.find(c => c.id === id);
    if (!conv) return;
    currentConvId = id;
    history = [];
    const msgs = document.getElementById('messages');
    msgs.innerHTML = '';
    conv.messages.forEach(m => {
      addMsg('user', m.user);
      addMsg('bot', m.bot);
      history.push({ role: 'user', parts: [{ text: m.user }] });
      history.push({ role: 'model', parts: [{ text: m.bot }] });
    });
    renderConvList();
  }

  function newChat() {
    currentConvId = null;
    history = [];
    const msgs = document.getElementById('messages');
    msgs.innerHTML = '<div class="welcome"><div class="welcome-title" id="welcome-name">' + botName.toUpperCase() + '</div><div class="welcome-sub">TON IA PERSONNELLE — PRÊTE À T\'AIDER</div></div>';
    renderConvList();
  }
</script>
</body>
</html>
